# Curated skill registry for the find-skill capability.
#
# This is search layer 2 in the find-skill search order (1 = already-installed
# skills, 2 = this registry, 3 = platform-native catalog, 4 = public search).
# `scripts/find_skill.py search` ranks these entries against a natural-language
# query; `install` clones source_repo and copies source_path into the target
# platform's skills directory AFTER PM/client approval.
#
# Curation rules:
# - Entries must name a real, publicly reachable skill. Verify source_repo and
#   source_path before adding; re-verify before installing (upstream repos move).
# - `trust` is "curated" (maintainer-verified), "community" (well-known public
#   collection, not re-verified per release), or "unverified".
# - Keep keywords generous — they are what deterministic search matches on.
# - Concrete skill names are allowed here (this file and role-skill-map.toml
#   are exactly the places for them; role files reference categories only).
#
# Sources referenced below (verified 2026-07):
# - obra/superpowers — community collection behind most role-skill-map candidates.
# - anthropics/skills — Anthropic's public document/agent skills.
# The `install` field shows the skills.sh CLI form (needs Node); find_skill.py's
# own `install` command is the no-Node path via git clone.

schema_version = 1

[[skills]]
name = "test-driven-development"
description = "Write a failing test first, then implement; red-green-refactor discipline for features and bug fixes."
category = "a test-driven development skill"
keywords = ["tdd", "testing", "unit test", "failing test", "red green refactor"]
source_repo = "https://github.com/obra/superpowers"
source_path = "skills/test-driven-development"
install = "npx skills add obra/superpowers@test-driven-development -g"
trust = "community"

